<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,user-scalable=yes">
  <title>2026年三维人类进入四维世界统一考试</title>
  <style>
    body {
      margin: 0;

      background: #dcdcdc;

      font-family: "SimSun", "宋体", serif;

      height: 100vh;

      display: flex;
      flex-direction: column;

      overflow: hidden;
    }

    div label {
      display: block;
    }

    #cardWrapper {
      overflow: hidden;

      max-height: 500px;

      transition:
        max-height 0.3s ease;
    }

    #cardWrapper.collapsed {
      max-height: 0;
    }

    .overlay {

      position: fixed;

      left: 0;
      top: 0;

      width: 100vw;
      height: 100vh;

      background:
        rgba(0, 0, 0, .45);

      display: none;

      justify-content: center;
      align-items: center;

      z-index: 999999;
    }

    .dialog {

      background: white;

      width: 420px;

      max-width: 90vw;

      border: 2px solid #222;

      padding: 25px;

      box-shadow:
        0 0 30px rgba(0, 0, 0, .4);

      text-align: center;
      display: none;
    }

    .dialog h2 {

      margin-top: 0;

      font-family:
        "SimSun", "宋体";

      border-bottom:
        1px solid #ccc;

      padding-bottom: 10px;
    }

    .dialog-buttons {

      margin-top: 20px;

      display: flex;

      justify-content: center;

      gap: 20px;
    }

    .dialog button {

      min-width: 100px;

      padding: 8px 20px;

      cursor: pointer;
    }

    .paper {
      position: relative;

      width: 420mm;
      min-height: 297mm;

      background: white;

      margin: 20px;

      box-sizing: border-box;

      padding:
        15mm 15mm 15mm 25mm;

      box-shadow:
        0 0 12px rgba(0, 0, 0, .3);
    }

    .paper::before {

      content:
        "wxyhly.github.io - Hqak";

      position: absolute;

      left: 50%;
      top: 50%;

      transform:
        translate(-50%, -50%) rotate(-30deg);

      font-size: 100px;

      font-weight: bold;

      color: rgba(128, 128, 128, 0.1);

      white-space: nowrap;

      pointer-events: none;

      z-index: 0;
    }

    .seal-line {
      position: absolute;

      left: 0;
      top: 0;

      width: 18mm;
      height: 100%;

      border-right: 2px dotted black;

      display: flex;

      justify-content: center;
      align-items: center;

      /* overflow:hidden; */
    }

    .subject-header {

      font-size: 22px;

      font-weight: bold;

      margin-top: 12px;
      margin-bottom: 10px;
      padding-bottom: 4px;
    }

    .seal-text {
      white-space: nowrap;

      transform: rotate(-90deg);

      transform-origin: center center;

      font-size: 18px;

      letter-spacing: 2px;
    }

    .page-content {
      height: 100%;
    }

    .columns {
      display: flex;
      gap: 10mm;
    }

    .column {
      flex: 1;
    }

    .page-number {
      text-align: center;

      margin-top: 10mm;
      margin-bottom: 5mm;
      bottom: 20px;
      position: absolute;
      width: 92%;
      font-size: 14px;
    }

    .topbar {
      background: #fff;
      padding: 8px;
      border-bottom: 1px solid #999;
      /* z-index: 999; */
    }

    .questions {
      flex: 1;

      overflow-y: auto;

      overflow-x: auto;
    }

    .topbar {
      flex-shrink: 0;
    }

    .answer-card {
      display: flex;
      flex-wrap: wrap;
      gap: 4px
    }

    .card {
      width: 34px;
      height: 28px;
      border: 1px solid #666;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: #eee
    }

    .done {
      background: #9ec5ff
    }

    .answer-right {
      background: #b7efb7
    }

    .answer-wrong {
      background: #ffb7b7
    }

    .secret {
      text-align: left;
      font-weight: bold
    }

    .title {
      text-align: center;
      font-size: 28px;
      margin: 20px
    }

    .info {
      text-align: center
    }

    .question {
      scroll-margin-top: 10vh;
      scroll-margin-left: 50px;
      scroll-margin-right: 50px;
      break-inside: avoid;
      /* border-bottom: 1px dotted #bbb; */
      padding: 6px 0;
      margin-bottom: 6px
    }

    .meta {
      font-size: 12px;
      color: #666;
    }

    .analysis {
      display: none;
      margin-top: 8px;
      padding: 6px;
      background: #fafafa
    }

    .submit-area {
      text-align: center;
      margin: 8px
    }

    button {
      background-color: white;
      border-radius: 3px;
      border: 1px solid black;
      color: red;
    }

    .score {
      font-size: 32px;
      font-weight: bold;
      text-align: center;
      width: 80%;
      color: #900;
      position: absolute;
      z-index: 10;
    }

    @media print {
      body {
        background: #fff
      }

      .paper {
        box-shadow: none;
        margin: 0
      }

      .topbar,
      .submit-area {
        display: none
      }
    }

    .underline {
      border-bottom: black solid 1px;
      width: 40px;
    }
  </style>
</head>

<body>

  <div class="topbar">
    <div style="cursor: pointer;text-align: center;"><b
        onclick="document.getElementById('cardWrapper').classList.toggle('collapsed')"> --- 答题卡 --- </b> 页面缩放:
      <input type="range" min="0.5" max="1.5" step="0.05" value="1" id="zoom">
      <button onclick="showShareDialog()">分享试卷</button>
      <button onclick="showSubmitDialog()">提交试卷</button>
    </div>
    <div id="cardWrapper" class="collapsed">
      <div id="card" class="answer-card"></div>
    </div>
  </div>

  <div id="questions" class="questions">
    <div id="paperContainer"></div>
  </div>

  <!-- </div> -->
  <div id="overlay" class="overlay">

    <div id="confirmDialog" class="dialog">

      <h2>确认交卷</h2>

      <div id="confirmText"></div>

      <div class="dialog-buttons">

        <button id="cancelSubmit" onclick="closeOverlay();">
          继续检查
        </button>

        <button id="doSubmit" onclick="submitPaper()">
          交卷
        </button>

      </div>

    </div>

    <div id="resultDialog" class="dialog">

      <h2 id="res-title">考试结束</h2>

      <div id="resultText"></div>

      <div class="dialog-buttons">

        <button id="closeResult" onclick="closeOverlay()"> 查看解析 </button>

      </div>

    </div>


    <div id="shareDialog" class="dialog">

      <h2 id="copy-title"></h2>

      <p style="margin:15px 0;">
        打开该链接后，将自动加载当前答题状态。
      </p>

      <textarea id="shareUrl" readonly
        style="width:100%;height:100px;box-sizing:border-box;resize:none;font-family:monospace;"></textarea>

      <div class="dialog-buttons">

        <button onclick="copyShareURL()">
          复制链接
        </button>

        <button onclick="hideShareDialog()">
          关闭
        </button>

      </div>

    </div>

  </div>
  <script>
    const paperContainer = document.getElementById("paperContainer");
    zoom.oninput = () => {
      paperContainer.style.transform = `scale(${zoom.value})`;
      paperContainer.style.transformOrigin = "top left";
      paperContainer.style.width = (100 * zoom.value) + "%";
    };
    const QUESTION_BANK = `难度	科目	题目 	选项A	选项B	选项C	选项D	选项E	选项F	答案	解析

2	基础几何	已知所有圆/球/超球的直径均为1，所有柱体锥体的高均为1，则()。	圆锥柱比圆柱锥体积更小	双圆柱的体积比超球的体积更小	双圆锥的体积比圆柱柱的体积更小	圆柱柱与双圆柱的体积相同	圆锥锥的体积是圆柱柱体积的1/9		C	圆锥柱是等底等高的圆柱柱体积的1/3，而圆柱锥则是1/4，A错；相同直径的超球可完全包含于双圆柱内部，B错；双圆锥可完全包含于双圆柱内部，而双圆柱可包含在圆柱柱内部，C对；圆柱柱与双圆柱的体积相差pi/4倍，D错；圆锥锥的体积是圆柱柱体积的1/12，E错。
2	基础几何	在二维空间的圆周放在三维空间中加一点厚度得到圆环(即甜甜圈形状)，把这个三维空间中的圆环面继续在四维空间中加一个厚度，得到()。	球环	环球	双圆环	圆环环	平圆环		D	球环、环球、圆环环、双圆环分别可以看作圆周、球面、圆环面、两圆周直积（平圆环面）在四维空间中的加厚体。
2	基础几何	两张平面，若其中一平面内有直线垂直于另一个平面，但没有直接平行于另一个平面，则两平面()	二面角为90°	绝对垂直	半垂直	通过平移能让它们共三维空间	可能交于一点，但可通过平移使得它们不相交		C	参考半垂直的定义；共点的平面无法通过平移不相交。
2	基础几何	两张平面没有交集，则两平面不可能()	二面角可以不为0°	绝对平行	半平行	通过平移能让它们共三维空间	通过平移能让它们相交于一点		E	两平面可半平行

1	基础几何	与正24胞体对偶的图形是正()胞体。	5	8	16	24	120	600	D	正24胞体为自对偶
2	基础几何	下面类比关系错误的是()	线段-三角形-四面体-五胞体	线段-正方形-菱形十二面体-正二十四胞体	线段-正方形-截半立方体-正二十四胞体	线段-正方形-正八面体-正十六胞体	线段-正六边形-正八面体-过截角正五胞体	全对	F	A都是单形；B、C中的菱形十二面体与截半立方体互为对偶，但正二十四胞体自对偶，不矛盾；D都是正轴形；E参见五维超立方体截面文章。

3	基础几何	已知平面A与平面B等角，平面B与平面C等角，则()。	平面A与平面C一定等角	平面A与平面C不可能等角	平面A与平面C可能半平行	若存在平面D与平面A、B和C都等角，则A与C也可能不等角			C	等角分成左右手两种，只有同手性等角才有传递性。若两次等角手性相反，则一个角度增大另一个角度减少，可能出现半平行的情况。
3	基础几何	已知平面A与平面B等角，则()。	若平面C与平面D也成相同角度的等角，则平面A与B组成的图形不一定能通过旋转与平面C、D重合	平面A的法平面不一定跟平面B等角	平面B中的任意直线与平面A的夹角不一定都相同。	平面A与平面B不一定只相交于一点，还可能有其它情况			A	除非绝对平行或绝对垂直，等角平面是有手性的，因此存在不能通过旋转重合的情况
2	基础几何	与给定两个平面同时都半平行半垂直的平面的张数，下面说法正确的是()	若两平面等角，则有且仅有一张	若两平面半平行，则有无穷张	若两平面半垂直但不等角，则有且仅有两张	若两平面等角，则有且仅有两张平面	以上全错		C	除了等角为无穷张外，其余情况仅两张。可在平面状态空间中思考。

    const SHARE_CHARS = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-_";

    function parity(str) {
      let p = 0;
      for (const c of str) p ^= SHARE_CHARS.indexOf(c);
      return p & 63;

    function buildShareURL(onlyData) {

        if (checked) v = "ABCDEF".indexOf(checked.value) + 1;

        data += SHARE_CHARS[v];

      data += SHARE_CHARS[submitted ? 1 : 0];
      data += SHARE_CHARS[parity(data)];
      data = rleEncode(data);

    function loadShareURL() {
      const data = rleDecode(new URLSearchParams(location.search).get("a"));
      if (!data || data.length !== 52) return;

      const body = data.slice(0, 51);
      const check = SHARE_CHARS.indexOf(data[51]);

      if (parity(body) !== check) {
        console.error("分享链接校验失败");
        return;
      }

      let bits = "";

      for (let i = 0; i < 50; i++) {
        const v = SHARE_CHARS.indexOf(data[i]);
        bits += v.toString(2).padStart(6, "0");
      }

      for (let i = 0; i < 100; i++) {
        const v = parseInt(bits.slice(i * 3, i * 3 + 3), 2);

        if (v === 0) continue;

        const option = "ABCDEF"[v - 1];

    function rleEncode(str) {
      let out = "";
      let i = 0;

      while (i < str.length) {
        let j = i + 1;

        while (j < str.length && str[j] === str[i]) {
          j++;
        }

        const cnt = j - i;

        if (cnt >= 4) {
          out += "~" + cnt + "~" + str[i];
        } else {
          out += str.slice(i, j);
        }

        i = j;
      }

      return shiftEncode(out);
    }
    function rleDecode(str) {
      if (!str) return;
      str = shiftDecode(str);
      return str.replace(
        /~(\d+)~(.)/g,
        (_, count, ch) => ch.repeat(+count)
      );
    }
    function shiftEncode(str) {
      let out = "";

      for (let i = 0; i < str.length; i++) {
        const idx = SHARE_CHARS.indexOf(str[i]);

        if (idx === -1) {
          out += str[i];
          continue;
        }

        out += SHARE_CHARS[(idx + i) & 63];
      }

      return out;
    }
    function shiftDecode(str) {
      let out = "";

      for (let i = 0; i < str.length; i++) {
        const idx = SHARE_CHARS.indexOf(str[i]);

        if (idx === -1) {
          out += str[i];
          continue;
        }

        out += SHARE_CHARS[(idx - i + 64 * 10) & 63];
      }

      return out;
    }
