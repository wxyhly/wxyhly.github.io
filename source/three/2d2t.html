<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>2D空间+2D时间多球碰撞</title>
    <style>
        body {
            margin: 0;
            background: #111;
            color: #eee;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            touch-action: none;
        }

        .main {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 10px;
        }

        canvas {
            border: 1px solid #555;
            background: #000;
            touch-action: none;
        }

        .panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 8px;
            align-items: center;
        }

        button,
        select,
        input {
            padding: 8px 12px;
            font-size: 14px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
        }

        button {
            background: #e94560;
            color: white;
        }

        button:active {
            background: #c23152;
        }

        select,
        input {
            background: #333;
            color: white;
        }

        .info-text {
            font-size: 13px;
            color: #aaa;
            max-width: 600px;
            text-align: center;
        }

        #status {
            font-weight: bold;
            color: #ffaa00;
        }
    </style>
</head>

<body>
    <h3>二维时间多球碰撞 · 2D2T by Hqak</h3>
    <div class="info-text">
        <b>编辑边界</b>：在时间图上点击⚪控制点（时刻），然后在空间画面<b>拖动任意小球</b>设置位置。<br>
        <b>查看解</b>：悬停时间图空白处，左侧同步显示该时刻求解后的所有小球（求解中也可查看）。
    </div>
    <div class="main">
        <div class="panel">
            <span>空间画面（编辑时显示控制点）</span>
            <canvas id="spaceCanvas" width="320" height="320"></canvas>
        </div>
        <div class="panel">
            <span>时间画面 · 点击⚪编辑 | 悬停查看</span>
            <canvas id="timeCanvas" width="320" height="320"></canvas>
        </div>
    </div>
    <div class="controls">
        <label>小球数量 <select id="numBallsSel">
                <option value="1">1</option>
                <option value="2" selected>2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
            </select></label>
        <label>空间边界 <select id="boundaryType">
                <option value="wall">弹性墙壁</option>
                <option value="torus">T² 环面</option>
            </select></label>
        <label>R通道 <select id="chR"></select></label>
        <label>G通道 <select id="chG"></select></label>
        <label>B通道 <select id="chB"></select></label>
        <label>重力 <input type="range" id="gravitySlider" min="0" max="0.1" step="0.002" value="0"><span
                id="gravityVal">0.000</span></label>
        <button id="randomBtn">🎲 随机边界</button>
        <button id="solveBtn">▶ 开始求解</button>
        <button id="resetBtn">↺ 重置内部</button>
        <span id="status">点击时间图上的⚪控制点开始编辑。</span>
    </div>

    <script>
        (() => {
            // ---------- DOM ----------
            const spaceCanvas = document.getElementById('spaceCanvas');
            const spaceCtx = spaceCanvas.getContext('2d');
            const timeCanvas = document.getElementById('timeCanvas');
            const timeCtx = timeCanvas.getContext('2d');
            const numBallsSel = document.getElementById('numBallsSel');
            const boundaryTypeSel = document.getElementById('boundaryType');
            const chRSel = document.getElementById('chR');
            const chGSel = document.getElementById('chG');
            const chBSel = document.getElementById('chB');
            const gravitySlider = document.getElementById('gravitySlider');
            const gravityValSpan = document.getElementById('gravityVal');
            const randomBtn = document.getElementById('randomBtn');
            const solveBtn = document.getElementById('solveBtn');
            const resetBtn = document.getElementById('resetBtn');
            const statusDiv = document.getElementById('status');

            // ---------- 参数 ----------
            const NT = 160;
            const ballRadius = 0.04;
            const repulsionStrength = 1.5;   // 恢复较强排斥
            const maxRepulsion = 0.5;        // 二次方力上限，防止过大
            const omega = 1.3;               // 稍低松弛因子，增强稳定性

            let numBalls = 2;
            let boundaryType = 'wall';
            let gravity = 0.0;
            let activeTimePoint = null;
            let showProbe = false;
            let editingPoint = -1;
            let dragBall = -1;
            let solved = false;
            let solving = false;
            let animationId = null;

            // 控制点弧长参数（升序，左下角为0.0，顺时针：下中、右下、右中、右上、上中、左上、左中）
            const controlPointS = [0.0, 0.125, 0.25, 0.375, 0.5, 0.625, 0.75, 0.875];
            // ctrlPoints[pointIdx][ballIdx] = {x, y}
            let ctrlPoints = [];

            let fields = [];

            const channelOptions = [];
            function buildChannelOptions() {
                channelOptions.length = 0;
                channelOptions.push({ name: '最小间距', id: 'minDist' });
                channelOptions.push({ name: '平均间距', id: 'avgDist' });
                channelOptions.push({ name: '墙壁距离', id: 'wallDist' });
                channelOptions.push({ name: '重叠密度', id: 'density' });
                for (let b = 0; b < numBalls; b++) {
                    channelOptions.push({ name: `球${b + 1} X`, id: `x${b}` });
                    channelOptions.push({ name: `球${b + 1} Y`, id: `y${b}` });
                    channelOptions.push({ name: `球${b + 1} |V|`, id: `v${b}` });
                }
            }
            function populateSelect(sel, defaultId) {
                sel.innerHTML = '';
                channelOptions.forEach(opt => {
                    const o = document.createElement('option');
                    o.value = opt.id;
                    o.textContent = opt.name;
                    if (opt.id === defaultId) o.selected = true;
                    sel.appendChild(o);
                });
            }

            // ---------- 随机并防重叠 ----------
            function randomizeCtrlPoints() {
                const margin = ballRadius * 1.5;
                ctrlPoints = [];
                for (let p = 0; p < 8; p++) {
                    const positions = [];
                    for (let b = 0; b < numBalls; b++) {
                        let attempts = 0;
                        let x, y;
                        do {
                            x = Math.random();
                            y = Math.random();
                            attempts++;
                        } while (attempts < 200 && positions.some(pos => Math.hypot(pos.x - x, pos.y - y) < margin));
                        positions.push({ x, y });
                    }
                    ctrlPoints.push(positions);
                }
                solved = false;
                if (solving) stopSolving();
                initFields();
                drawTimeCanvas();
                drawSpaceCanvas();
                statusDiv.textContent = '随机边界已生成，点击求解。';
            }

            function initCtrlPoints() {
                randomizeCtrlPoints();
            }

            // 弧长s -> 网格坐标
            function sToGrid(s) {
                const total = 4;
                let t = s * total;
                let x, y;
                if (t < 1) { x = t; y = 0; }
                else if (t < 2) { x = 1; y = t - 1; }
                else if (t < 3) { x = 3 - t; y = 1; }
                else { x = 0; y = 4 - t; }
                const i = Math.min(NT - 1, Math.max(0, Math.floor(y * NT)));
                const j = Math.min(NT - 1, Math.max(0, Math.floor(x * NT)));
                return { i, j };
            }

            function getBoundaryS(i, j) {
                if (i === 0) return (j / (NT - 1)) / 4;
                if (j === NT - 1) return 0.25 + (i / (NT - 1)) / 4;
                if (i === NT - 1) return 0.5 + ((NT - 1 - j) / (NT - 1)) / 4;
                if (j === 0) return 0.75 + ((NT - 1 - i) / (NT - 1)) / 4;
                return null;
            }

            function interpolateBoundary(s, ballIdx) {
                // 构建扩展弧长数组（增加s=1.0，对应左下角）
                const sArr = controlPointS.concat([1.0]);
                for (let k = 0; k < sArr.length - 1; k++) {
                    const s1 = sArr[k];
                    const s2 = sArr[k + 1];
                    const ds = s2 - s1; // 恒正
                    if (s >= s1 && s < s2) {
                        const t = (s - s1) / ds;
                        const p1 = ctrlPoints[k];
                        const p2 = (k === 7) ? ctrlPoints[0] : ctrlPoints[k + 1];
                        return {
                            x: p1[ballIdx].x + t * (p2[ballIdx].x - p1[ballIdx].x),
                            y: p1[ballIdx].y + t * (p2[ballIdx].y - p1[ballIdx].y)
                        };
                    }
                }
                // 理论上不会到这里，兜底
                return ctrlPoints[0][ballIdx];
            }

            function initFields() {
                fields = [];
                for (let b = 0; b < numBalls; b++) {
                    const arr = new Array(NT);
                    for (let i = 0; i < NT; i++) {
                        arr[i] = new Array(NT);
                        for (let j = 0; j < NT; j++) arr[i][j] = { x: 0, y: 0 };
                    }
                    fields.push(arr);
                }
                for (let i = 0; i < NT; i++) {
                    for (let j = 0; j < NT; j++) {
                        const s = getBoundaryS(i, j);
                        if (s !== null) {
                            for (let b = 0; b < numBalls; b++) {
                                const pos = interpolateBoundary(s, b);
                                fields[b][i][j].x = pos.x;
                                fields[b][i][j].y = pos.y;
                            }
                        }
                    }
                }
            }

            function resetInterior() {
                for (let b = 0; b < numBalls; b++) {
                    for (let i = 1; i < NT - 1; i++) {
                        for (let j = 1; j < NT - 1; j++) {
                            if (getBoundaryS(i, j) === null) {
                                fields[b][i][j].x = 0;
                                fields[b][i][j].y = 0;
                            }
                        }
                    }
                }
                solved = false;
            }
            function clampToBounds(x, y) {
                const min = ballRadius;
                const max = 1 - ballRadius;
                return {
                    x: Math.min(max, Math.max(min, x)),
                    y: Math.min(max, Math.max(min, y))
                };
            }
            function iterateStep() {
                let maxChange = 0;
                for (let i = 1; i < NT - 1; i++) {
                    for (let j = 1; j < NT - 1; j++) {
                        if (getBoundaryS(i, j) !== null) continue;
                        for (let b = 0; b < numBalls; b++) {
                            const up = fields[b][i - 1][j], down = fields[b][i + 1][j];
                            const left = fields[b][i][j - 1], right = fields[b][i][j + 1];
                            let newX = (up.x + down.x + left.x + right.x) / 4;
                            let newY = (up.y + down.y + left.y + right.y) / 4;

                            // 重力
                            newY += gravity * 0.01;

                            const pos = { x: fields[b][i][j].x, y: fields[b][i][j].y };
                            let forceX = 0, forceY = 0;
                            // 球间排斥
                            for (let b2 = 0; b2 < numBalls; b2++) {
                                if (b2 === b) continue;
                                const pos2 = fields[b2][i][j];
                                const dx = pos.x - pos2.x, dy = pos.y - pos2.y;
                                const dist = Math.sqrt(dx * dx + dy * dy);
                                const minDist = 2 * ballRadius;
                                if (dist < minDist && dist > 1e-8) {
                                    let strength = repulsionStrength * (minDist - dist) * (minDist - dist);
                                    strength = Math.min(strength, maxRepulsion);
                                    forceX += (dx / dist) * strength;
                                    forceY += (dy / dist) * strength;
                                }
                            }
                            // 墙壁排斥（弹性墙壁）
                            if (boundaryType === 'wall') {
                                const r = ballRadius;
                                if (pos.x < r) {
                                    let s = repulsionStrength * (r - pos.x) * (r - pos.x);
                                    forceX += Math.min(s, maxRepulsion);
                                }
                                if (pos.x > 1 - r) {
                                    let s = repulsionStrength * (pos.x - (1 - r)) * (pos.x - (1 - r));
                                    forceX -= Math.min(s, maxRepulsion);
                                }
                                if (pos.y < r) {
                                    let s = repulsionStrength * (r - pos.y) * (r - pos.y);
                                    forceY += Math.min(s, maxRepulsion);
                                }
                                if (pos.y > 1 - r) {
                                    let s = repulsionStrength * (pos.y - (1 - r)) * (pos.y - (1 - r));
                                    forceY -= Math.min(s, maxRepulsion);
                                }
                            }
                            newX += forceX;
                            newY += forceY;

                            // 强制投影：确保不穿透墙壁
                            if (boundaryType === 'wall') {
                                const clamped = clampToBounds(newX, newY);
                                newX = clamped.x;
                                newY = clamped.y;
                            } else if (boundaryType === 'torus') {
                                // 环面边界：取模（无限制）
                                newX = ((newX % 1) + 1) % 1;
                                newY = ((newY % 1) + 1) % 1;
                            }

                            const oldX = fields[b][i][j].x, oldY = fields[b][i][j].y;
                            fields[b][i][j].x = (1 - omega) * oldX + omega * newX;
                            fields[b][i][j].y = (1 - omega) * oldY + omega * newY;
                            maxChange = Math.max(maxChange, Math.abs(fields[b][i][j].x - oldX), Math.abs(fields[b][i][j].y - oldY));
                        }
                    }
                }
                return maxChange;
            }

            function startSolving() {
                if (solving) return;
                stopSolving();
                initFields();
                resetInterior();
                solving = true;
                solved = false;
                statusDiv.textContent = '求解中...';
                let iter = 0;
                function step() {
                    if (!solving) return;
                    const change = iterateStep();
                    iter++;
                    if (iter % 3 === 0 || change < 0.001) {
                        drawTimeCanvas();
                        drawSpaceCanvas();
                    }
                    if (change > 0.0001 && iter < 2000) {
                        animationId = requestAnimationFrame(step);
                    } else {
                        solved = true;
                        solving = false;
                        statusDiv.textContent = `求解完成 (迭代${iter}次, 残差${change.toExponential(2)})`;
                        drawTimeCanvas();
                        drawSpaceCanvas();
                    }
                }
                animationId = requestAnimationFrame(step);
            }

            function stopSolving() {
                solving = false;
                if (animationId) { cancelAnimationFrame(animationId); animationId = null; }
            }

            // ---------- 绘图 ----------
            const ballColors = ['#ff4444', '#44ff44', '#4488ff', '#ffaa22', '#aa44ff'];

            function drawSpaceCanvas() {
                const w = spaceCanvas.width, h = spaceCanvas.height;
                spaceCtx.clearRect(0, 0, w, h);
                spaceCtx.fillStyle = '#111';
                spaceCtx.fillRect(0, 0, w, h);
                spaceCtx.strokeStyle = '#333';
                spaceCtx.lineWidth = 0.5;
                for (let i = 0; i <= 4; i++) {
                    const x = i / 4 * w, y = i / 4 * h;
                    spaceCtx.beginPath(); spaceCtx.moveTo(x, 0); spaceCtx.lineTo(x, h); spaceCtx.stroke();
                    spaceCtx.beginPath(); spaceCtx.moveTo(0, y); spaceCtx.lineTo(w, y); spaceCtx.stroke();
                }

                if (editingPoint >= 0) {
                    const pointData = ctrlPoints[editingPoint];
                    for (let b = 0; b < numBalls; b++) {
                        const pos = pointData[b];
                        const cx = pos.x * w, cy = pos.y * h;
                        const r = ballRadius * w + 2;
                        spaceCtx.beginPath();
                        spaceCtx.arc(cx, cy, r, 0, 2 * Math.PI);
                        spaceCtx.fillStyle = ballColors[b % ballColors.length];
                        spaceCtx.fill();
                        spaceCtx.strokeStyle = 'white';
                        spaceCtx.lineWidth = 1.5;
                        spaceCtx.stroke();
                        spaceCtx.fillStyle = 'white';
                        spaceCtx.font = 'bold 10px sans-serif';
                        spaceCtx.textAlign = 'center';
                        spaceCtx.fillText(b + 1, cx, cy + 4);
                    }
                    spaceCtx.fillStyle = 'white';
                    spaceCtx.font = '12px sans-serif';
                    spaceCtx.fillText(`编辑时刻 ${editingPoint + 1}`, w / 2, 20);
                    return;
                }

                if ((!solved && !solving) || !activeTimePoint) {
                    spaceCtx.fillStyle = '#888';
                    spaceCtx.font = '14px sans-serif';
                    spaceCtx.textAlign = 'center';
                    spaceCtx.fillText('悬停时间图查看', w / 2, h / 2);
                    return;
                }
                const { u, v } = activeTimePoint;
                const i = Math.floor(v * (NT - 1)), j = Math.floor(u * (NT - 1));
                for (let b = 0; b < numBalls; b++) {
                    const pos = fields[b][i][j];
                    const cx = pos.x * w, cy = pos.y * h;
                    const r = ballRadius * w;
                    spaceCtx.beginPath();
                    spaceCtx.arc(cx, cy, r, 0, 2 * Math.PI);
                    spaceCtx.fillStyle = ballColors[b % ballColors.length];
                    spaceCtx.fill();
                    spaceCtx.strokeStyle = 'white';
                    spaceCtx.lineWidth = 1.5;
                    spaceCtx.stroke();
                }
            }

            function drawTimeCanvas() {
                const w = timeCanvas.width, h = timeCanvas.height;
                timeCtx.clearRect(0, 0, w, h);
                if (solved || solving) {
                    const imageData = timeCtx.createImageData(w, h);
                    const data = imageData.data;
                    const chR = chRSel.value, chG = chGSel.value, chB = chBSel.value;
                    for (let py = 0; py < h; py++) {
                        for (let px = 0; px < w; px++) {
                            const u = px / (w - 1), v = py / (h - 1);
                            const i = Math.floor(v * (NT - 1)), j = Math.floor(u * (NT - 1));
                            const pixel = getChannelValues(i, j, chR, chG, chB);
                            const idx = (py * w + px) * 4;
                            data[idx] = pixel[0]; data[idx + 1] = pixel[1]; data[idx + 2] = pixel[2]; data[idx + 3] = 255;
                        }
                    }
                    timeCtx.putImageData(imageData, 0, 0);
                } else {
                    timeCtx.fillStyle = '#111';
                    timeCtx.fillRect(0, 0, w, h);
                }

                for (let p = 0; p < 8; p++) {
                    const s = controlPointS[p];
                    const { i, j } = sToGrid(s);
                    const cx = (j + 0.5) / NT * w, cy = (i + 0.5) / NT * h;
                    timeCtx.beginPath();
                    timeCtx.arc(cx, cy, editingPoint === p ? 8 : 5, 0, 2 * Math.PI);
                    timeCtx.fillStyle = editingPoint === p ? 'yellow' : 'rgba(255,255,255,0.9)';
                    timeCtx.fill();
                    timeCtx.strokeStyle = 'black';
                    timeCtx.lineWidth = 1;
                    timeCtx.stroke();
                }

                if (showProbe && activeTimePoint && editingPoint < 0) {
                    const cx = activeTimePoint.u * w, cy = activeTimePoint.v * h;
                    timeCtx.beginPath();
                    timeCtx.arc(cx, cy, 5, 0, 2 * Math.PI);
                    timeCtx.fillStyle = 'cyan';
                    timeCtx.fill();
                    timeCtx.strokeStyle = 'white';
                    timeCtx.stroke();
                }
            }

            function getChannelValues(i, j, chR, chG, chB) {
                const res = [0, 0, 0];
                [chR, chG, chB].forEach((ch, idx) => {
                    let val = 0;
                    switch (ch) {
                        case 'minDist': {
                            let minD = Infinity;
                            for (let b1 = 0; b1 < numBalls; b1++)
                                for (let b2 = b1 + 1; b2 < numBalls; b2++) {
                                    const dx = fields[b1][i][j].x - fields[b2][i][j].x;
                                    const dy = fields[b1][i][j].y - fields[b2][i][j].y;
                                    const d = Math.sqrt(dx * dx + dy * dy);
                                    if (d < minD) minD = d;
                                }
                            val = Math.min(1, minD / (4 * ballRadius));
                            break;
                        }
                        case 'avgDist': {
                            let sum = 0, count = 0;
                            for (let b1 = 0; b1 < numBalls; b1++)
                                for (let b2 = b1 + 1; b2 < numBalls; b2++) {
                                    const dx = fields[b1][i][j].x - fields[b2][i][j].x;
                                    const dy = fields[b1][i][j].y - fields[b2][i][j].y;
                                    sum += Math.sqrt(dx * dx + dy * dy);
                                    count++;
                                }
                            val = count > 0 ? sum / count / 0.5 : 0;
                            break;
                        }
                        case 'wallDist': {
                            let minW = Infinity;
                            for (let b = 0; b < numBalls; b++) {
                                const x = fields[b][i][j].x, y = fields[b][i][j].y;
                                minW = Math.min(minW, x, 1 - x, y, 1 - y);
                            }
                            val = minW;
                            break;
                        }
                        case 'density': {
                            let overlap = 0;
                            for (let b1 = 0; b1 < numBalls; b1++)
                                for (let b2 = b1 + 1; b2 < numBalls; b2++) {
                                    const dx = fields[b1][i][j].x - fields[b2][i][j].x;
                                    const dy = fields[b1][i][j].y - fields[b2][i][j].y;
                                    const d = Math.sqrt(dx * dx + dy * dy);
                                    if (d < 2 * ballRadius) overlap += (2 * ballRadius - d);
                                }
                            val = overlap / 0.2;
                            break;
                        }
                        default: {
                            const match = ch.match(/^([xyv])(\d+)$/);
                            if (match) {
                                const type = match[1], b = parseInt(match[2]);
                                if (b < numBalls) {
                                    if (type === 'x') val = fields[b][i][j].x;
                                    else if (type === 'y') val = fields[b][i][j].y;
                                    else if (type === 'v') {
                                        const dx = (j < NT - 1 ? fields[b][i][j + 1].x - fields[b][i][j].x : 0);
                                        const dy = (j < NT - 1 ? fields[b][i][j + 1].y - fields[b][i][j].y : 0);
                                        val = Math.sqrt(dx * dx + dy * dy) * NT;
                                    }
                                }
                            }
                        }
                    }
                    res[idx] = Math.min(255, Math.max(0, Math.floor(val * 255)));
                });
                return res;
            }

            // ---------- 事件处理 ----------
            function timeToGrid(mx, my) {
                const u = mx / timeCanvas.width, v = my / timeCanvas.height;
                return { u: Math.max(0, Math.min(1, u)), v: Math.max(0, Math.min(1, v)) };
            }
            function spaceToCoord(mx, my) {
                const x = mx / spaceCanvas.width, y = my / spaceCanvas.height;
                return { x: Math.max(0, Math.min(1, x)), y: Math.max(0, Math.min(1, y)) };
            }
            function findControlPoint(mx, my) {
                const threshold = 12;
                for (let p = 0; p < 8; p++) {
                    const s = controlPointS[p];
                    const { i, j } = sToGrid(s);
                    const cx = (j + 0.5) / NT * timeCanvas.width, cy = (i + 0.5) / NT * timeCanvas.height;
                    if (Math.hypot(mx - cx, my - cy) < threshold) return p;
                }
                return -1;
            }

            timeCanvas.addEventListener('pointerdown', (e) => {
                const rect = timeCanvas.getBoundingClientRect();
                const mx = e.clientX - rect.left, my = e.clientY - rect.top;
                const cp = findControlPoint(mx, my);
                if (cp >= 0) {
                    stopSolving();
                    editingPoint = cp;
                    dragBall = -1;
                    showProbe = false;
                    activeTimePoint = null;
                    statusDiv.textContent = `编辑时刻 ${cp + 1}：在空间画布拖动任意小球`;
                } else {
                    editingPoint = -1;
                    dragBall = -1;
                    const { u, v } = timeToGrid(mx, my);
                    activeTimePoint = { u, v };
                    showProbe = true;
                }
                drawTimeCanvas();
                drawSpaceCanvas();
            });

            timeCanvas.addEventListener('pointermove', (e) => {
                if (editingPoint >= 0) return;
                const rect = timeCanvas.getBoundingClientRect();
                const mx = e.clientX - rect.left, my = e.clientY - rect.top;
                const { u, v } = timeToGrid(mx, my);
                if (!activeTimePoint || activeTimePoint.u !== u || activeTimePoint.v !== v) {
                    activeTimePoint = { u, v };
                    showProbe = true;
                    drawSpaceCanvas();
                    drawTimeCanvas();
                }
            });

            function findClosestBall(mx, my) {
                if (editingPoint < 0) return -1;
                const pointData = ctrlPoints[editingPoint];
                let minDist = Infinity, best = -1;
                for (let b = 0; b < numBalls; b++) {
                    const pos = pointData[b];
                    const cx = pos.x * spaceCanvas.width, cy = pos.y * spaceCanvas.height;
                    const dist = Math.hypot(mx - cx, my - cy);
                    if (dist < minDist) { minDist = dist; best = b; }
                }
                return (minDist < 25) ? best : -1;
            }

            spaceCanvas.addEventListener('pointerdown', (e) => {
                if (editingPoint < 0) return;
                const rect = spaceCanvas.getBoundingClientRect();
                const mx = e.clientX - rect.left, my = e.clientY - rect.top;
                dragBall = findClosestBall(mx, my);
                if (dragBall >= 0) {
                    spaceCanvas.setPointerCapture(e.pointerId);
                    statusDiv.textContent = `拖动球${dragBall + 1}`;
                    const { x, y } = spaceToCoord(mx, my);
                    ctrlPoints[editingPoint][dragBall] = { x, y };
                    solved = false;
                    drawSpaceCanvas();
                    drawTimeCanvas();
                }
            });
            spaceCanvas.addEventListener('pointermove', (e) => {
                if (dragBall < 0 || editingPoint < 0) return;
                const rect = spaceCanvas.getBoundingClientRect();
                const mx = e.clientX - rect.left, my = e.clientY - rect.top;
                const { x, y } = spaceToCoord(mx, my);
                ctrlPoints[editingPoint][dragBall] = { x, y };
                solved = false;
                drawSpaceCanvas();
                drawTimeCanvas();
            });
            spaceCanvas.addEventListener('pointerup', () => {
                if (dragBall >= 0) {
                    dragBall = -1;
                    spaceCanvas.releasePointerCapture();
                    statusDiv.textContent = `编辑时刻 ${editingPoint + 1}（边界已修改）`;
                }
            });
            // 重力滑块
            gravitySlider.addEventListener('input', () => {
                gravity = parseFloat(gravitySlider.value);
                gravityValSpan.textContent = gravity.toFixed(3);
            });
            gravitySlider.value = 0;
            gravityValSpan.textContent = '0.000';

            // 按钮事件
            randomBtn.addEventListener('click', () => {
                randomizeCtrlPoints();
                statusDiv.textContent = '随机边界已生成，可编辑或直接求解。';
            });
            solveBtn.addEventListener('click', () => {
                if (editingPoint >= 0) { editingPoint = -1; dragBall = -1; }
                startSolving();
            });
            resetBtn.addEventListener('click', () => {
                stopSolving();
                resetInterior();
                solved = false;
                statusDiv.textContent = '内部已重置';
                drawTimeCanvas();
                drawSpaceCanvas();
            });

            numBallsSel.addEventListener('change', () => {
                stopSolving();
                numBalls = parseInt(numBallsSel.value);
                initCtrlPoints();
                buildChannelOptions();
                populateSelect(chRSel, 'minDist');
                populateSelect(chGSel, 'x0');
                populateSelect(chBSel, 'v0');
                editingPoint = -1; dragBall = -1;
                activeTimePoint = null; showProbe = false;
                solved = false;
                drawTimeCanvas();
                drawSpaceCanvas();
            });
            boundaryTypeSel.addEventListener('change', () => {
                boundaryType = boundaryTypeSel.value;
                if (solved) startSolving();
            });
            chRSel.addEventListener('change', () => { if (solved) drawTimeCanvas(); });
            chGSel.addEventListener('change', () => { if (solved) drawTimeCanvas(); });
            chBSel.addEventListener('change', () => { if (solved) drawTimeCanvas(); });

            // 初始化
            initCtrlPoints();
            buildChannelOptions();
            populateSelect(chRSel, 'minDist');
            populateSelect(chGSel, 'x0');
            populateSelect(chBSel, 'v0');
            drawTimeCanvas();
            drawSpaceCanvas();
            statusDiv.textContent = '点击时间图上的⚪控制点开始编辑，或点击随机边界。';
        })();
    </script>
</body>

</html>
